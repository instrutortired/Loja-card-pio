<body class="bg-background text-on-background font-body-md min-h-screen pb-xl">
<!-- Header (Transactional, so no full nav shell) -->
<header class="sticky top-0 z-50 bg-surface/90 backdrop-blur-md border-b border-outline-variant">
<div class="flex items-center justify-between px-margin-mobile h-16">
<button aria-label="Voltar" class="text-primary p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Finalizar Pedido</h1>
<div class="w-10"></div> <!-- Spacer for alignment -->
</div>
</header>
<main class="px-margin-mobile py-lg max-w-md mx-auto space-y-xl">
<!-- Form Section -->
<section class="space-y-md">
<h2 class="font-headline-md text-headline-md text-on-surface">Dados de Entrega</h2>
<div class="space-y-sm">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="nome">Nome Completo</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="nome" placeholder="Seu nome" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="endereco">Endereço de Entrega</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="endereco" placeholder="Rua, Número, Bairro" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="complemento">Complemento (Opcional)</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-4 py-3 font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="complemento" placeholder="Apto, Bloco, etc." type="text"/>
</div>
</div>
</section>
<!-- Payment Method -->
<section class="space-y-md">
<h2 class="font-headline-md text-headline-md text-on-surface">Forma de Pagamento</h2>
<div class="grid grid-cols-1 gap-sm">
<label class="flex items-center p-4 border border-outline-variant rounded-DEFAULT bg-surface-container-lowest cursor-pointer hover:bg-surface-variant transition-colors has-[:checked]:border-primary has-[:checked]:ring-1 has-[:checked]:ring-primary">
<input checked="" class="text-primary focus:ring-primary h-5 w-5 border-outline-variant" name="pagamento" type="radio" value="pix"/>
<span class="ml-3 flex items-center gap-2 font-body-md text-body-md text-on-surface">
<span class="material-symbols-outlined text-primary" data-icon="qr_code_scanner">qr_code_scanner</span>
                        Pix
                    </span>
</label>
<label class="flex items-center p-4 border border-outline-variant rounded-DEFAULT bg-surface-container-lowest cursor-pointer hover:bg-surface-variant transition-colors has-[:checked]:border-primary has-[:checked]:ring-1 has-[:checked]:ring-primary">
<input class="text-primary focus:ring-primary h-5 w-5 border-outline-variant" name="pagamento" type="radio" value="cartao"/>
<span class="ml-3 flex items-center gap-2 font-body-md text-body-md text-on-surface">
<span class="material-symbols-outlined text-primary" data-icon="credit_card">credit_card</span>
                        Cartão (Crédito/Débito na entrega)
                    </span>
</label>
<label class="flex items-center p-4 border border-outline-variant rounded-DEFAULT bg-surface-container-lowest cursor-pointer hover:bg-surface-variant transition-colors has-[:checked]:border-primary has-[:checked]:ring-1 has-[:checked]:ring-primary">
<input class="text-primary focus:ring-primary h-5 w-5 border-outline-variant" name="pagamento" type="radio" value="dinheiro"/>
<span class="ml-3 flex items-center gap-2 font-body-md text-body-md text-on-surface">
<span class="material-symbols-outlined text-primary" data-icon="payments">payments</span>
                        Dinheiro
                    </span>
</label>
</div>
</section>
<!-- Order Summary -->
<section class="bg-tertiary-fixed rounded-lg p-md space-y-md border border-outline-variant">
<h2 class="font-headline-md text-headline-md text-on-tertiary-fixed">Resumo do Pedido</h2>
<div class="space-y-sm border-b border-outline-variant/30 pb-md">
<!-- Item 1 -->
<div class="flex justify-between items-center font-body-md text-body-md text-on-tertiary-fixed">
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm bg-surface/50 px-2 py-1 rounded">2x</span>
<span>Pão de Queijo Tradicional</span>
</div>
<span>R$ 14,00</span>
</div>
<!-- Item 2 -->
<div class="flex justify-between items-center font-body-md text-body-md text-on-tertiary-fixed">
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm bg-surface/50 px-2 py-1 rounded">1x</span>
<span>Bolo de Fubá com Goiabada</span>
</div>
<span>R$ 22,00</span>
</div>
</div>
<div class="space-y-2 pt-2">
<div class="flex justify-between font-body-md text-body-md text-on-tertiary-fixed-variant">
<span>Subtotal</span>
<span>R$ 36,00</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-tertiary-fixed-variant">
<span>Taxa de Entrega</span>
<span>R$ 5,00</span>
</div>
<div class="flex justify-between font-headline-md text-headline-md text-on-tertiary-fixed pt-sm">
<span>Total</span>
<span>R$ 41,00</span>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant p-margin-mobile shadow-lg">
<button class="w-full bg-[#D4AF37] text-[#22110D] font-label-md text-label-md font-semibold py-4 rounded-full flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all">
<svg fill="currentColor" height="20" viewbox="0 0 16 16" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"></path>
</svg>
            Enviar Pedido via WhatsApp
        </button>
</div>
